<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>assay — the glass box</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --line: #262b36; --text: #e6e9ef;
    --dim: #9aa3b2; --ok: #4cc38a; --bad: #e5484d; --accent: #7aa2f7; --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 system-ui, sans-serif; }
  main { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h1 span { color: var(--accent); }
  p.tag { color: var(--dim); margin: 0 0 24px; font-size: 14px; }
  form.ask { display: flex; gap: 8px; }
  input, button { font: inherit; }
  input[type=text] { flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #0b0d12; border: 0; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
  button.ghost { background: var(--panel); color: var(--text); border: 1px solid var(--line); font-weight: 400; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 0; }
  .chips button { background: var(--panel); color: var(--dim); border: 1px solid var(--line); border-radius: 999px; padding: 4px 12px; font-size: 13px; font-weight: 400; }
  .chips button:hover { color: var(--text); border-color: var(--accent); }
  #out { margin-top: 28px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .headline { font-size: 20px; font-weight: 650; font-family: var(--mono); }
  .badge { display: inline-block; font-size: 12px; border-radius: 999px; padding: 2px 10px; margin-left: 10px; vertical-align: 2px; }
  .badge.ok { background: rgba(76,195,138,.15); color: var(--ok); }
  .badge.bad { background: rgba(229,72,77,.15); color: var(--bad); }
  table.bands { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
  table.bands td { padding: 6px 0; vertical-align: top; border-top: 1px solid var(--line); }
  table.bands td.k { color: var(--dim); width: 130px; padding-right: 12px; white-space: nowrap; }
  .mono { font-family: var(--mono); font-size: 13px; }
  .ok { color: var(--ok); } .bad { color: var(--bad); } .dim { color: var(--dim); }
  details { margin-top: 10px; border: 1px solid var(--line); border-radius: 8px; }
  details summary { cursor: pointer; padding: 8px 12px; color: var(--dim); font-size: 13px; }
  details[open] summary { border-bottom: 1px solid var(--line); color: var(--text); }
  details pre { margin: 0; padding: 12px; overflow-x: auto; font-size: 12.5px; font-family: var(--mono); color: var(--text); }
  /* the execution trace (E2.15): the worked example, as a first-class element */
  .steps { margin: 14px 0 4px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .steps-title { padding: 8px 14px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); border-bottom: 1px solid var(--line); }
  .steps-title b { color: var(--text); font-weight: 600; text-transform: none; letter-spacing: 0; }
  .step { display: flex; align-items: baseline; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--line); }
  .step:last-child { border-bottom: 0; }
  .step.result { background: rgba(122,162,247,.07); }
  .step-n { flex: 0 0 22px; height: 22px; border-radius: 50%; background: var(--line); color: var(--dim);
            font-size: 12px; display: flex; align-items: center; justify-content: center; align-self: center; }
  .step.result .step-n { background: var(--accent); color: #0b0d12; font-weight: 700; }
  .step-body { flex: 1; min-width: 0; }
  .step-expr { font-family: var(--mono); font-size: 13px; overflow-wrap: anywhere; }
  .step-expr b { color: var(--accent); font-weight: 600; }
  .step-note { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
  .step-val { font-family: var(--mono); font-size: 14px; white-space: nowrap; text-align: right; }
  .step.result .step-val { font-weight: 700; }
  .state { border-left: 3px solid var(--accent); }
  .state.refuse { border-left-color: var(--bad); }
  .missing-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  .missing-row label { font-family: var(--mono); font-size: 14px; min-width: 40px; }
  .missing-row input { width: 220px; }
  .missing-row .dim { font-size: 13px; }
  .option { display: block; width: 100%; text-align: left; margin: 6px 0; }
  footer { margin-top: 40px; color: var(--dim); font-size: 13px; }
  footer h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 8px; }
  .domain { margin: 6px 0; }
  .domain b { color: var(--text); font-weight: 600; }
  .err { color: var(--bad); }
</style>
</head>
<body>
<main>
  <h1><span>assay</span> — the glass box</h1>
  <p class="tag">Ask a computable question. Every answer is executable, inspectable, reproducible —
  facts come from curated sources, never from a model.</p>

  <form class="ask" id="askform">
    <input type="text" id="question" placeholder="e.g. max deflection of a simply supported steel beam, 5 kN center load, 2 m span, I = 8.33e-6 m^4" autofocus>
    <button type="submit">Ask</button>
  </form>
  <div class="chips" id="chips"></div>

  <div id="out"></div>

  <footer>
    <h2>Covered domains</h2>
    <div id="domains" class="mono dim">loading…</div>
  </footer>
</main>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const el = (tag, cls, text) => {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
};

const EXAMPLES = [
  "solve x^2 - 5x + 6 = 0",
  "derivative of x^3 - x",
  "period of a simple pendulum 1 m long",
  "schwarzschild radius of a black hole of mass 1.989e30 kg",
  "heat to warm 2 kg of water by 10 K",
  "max deflection of a simply supported steel beam, 5 kN center load, 2 m span",
];

let lastQuestion = "";

async function post(path, body) {
  const response = await fetch(path, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await response.json().catch(() => ({}));
  return { status: response.status, data };
}

function fmt(value) {
  if (typeof value === "number") return Number(value.toPrecision(6)).toString();
  return String(value);
}

// display-only unit prettification: "kilogram / meter / second ** 2" reads as
// "kilogram / meter / second²" — the artifact keeps the exact raw form
const SUP = { 0: "⁰", 1: "¹", 2: "²", 3: "³", 4: "⁴", 5: "⁵", 6: "⁶", 7: "⁷", 8: "⁸", 9: "⁹" };
function prettyUnit(unit) {
  return (unit || "")
    .replace(/\s*\*\*\s*(\d+)/g, (_m, d) => [...d].map((c) => SUP[c] || c).join(""))
    .replace(/(\S)\s\*\s(\S)/g, "$1·$2");
}

// the worked example (E2.15): each row is the literal computation record — the
// step's authored expression and the value the executor actually computed
function stepsBlock(steps) {
  const box = el("div", "steps");
  const title = el("div", "steps-title");
  title.append("Worked steps — ", el("b", null, "each line is the actual computation, not a narration"));
  box.appendChild(title);
  steps.forEach((step, index) => {
    const row = el("div", "step" + (index === steps.length - 1 ? " result" : ""));
    row.appendChild(el("div", "step-n", String(index + 1)));
    const body = el("div", "step-body");
    const expr = el("div", "step-expr");
    expr.appendChild(el("b", null, step.label));
    if (step.expr) expr.append(" = " + step.expr);
    body.appendChild(expr);
    if (step.note) body.appendChild(el("div", "step-note", step.note));
    row.appendChild(body);
    row.appendChild(el("div", "step-val", `${fmt(step.value)} ${prettyUnit(step.unit)}`.trim()));
    box.appendChild(row);
  });
  return box;
}

function render(node) {
  const out = $("out");
  out.replaceChildren(node);
}

function bandsTable(rows) {
  const table = el("table", "bands");
  for (const [key, value] of rows) {
    const tr = el("tr");
    tr.appendChild(el("td", "k", key));
    const td = el("td");
    if (value instanceof Node) td.appendChild(value); else td.textContent = value;
    tr.appendChild(td);
    table.appendChild(tr);
  }
  return table;
}

function drilldown(title, payload) {
  const details = el("details");
  details.appendChild(el("summary", null, title));
  details.appendChild(el("pre", null, JSON.stringify(payload, null, 2)));
  return details;
}

function renderAnswer(body) {
  const { answer, artifact } = body;
  const card = el("div", "card");
  const ok = answer.verified.ok;

  const head = el("div", "headline");
  if (answer.result.length) {
    head.textContent = answer.result
      .map((v) => `${v.label} = ${fmt(v.value)}${v.unit ? " " + prettyUnit(v.unit) : ""}`)
      .join(" ,  ");
  } else {
    head.textContent = "answer withheld";
  }
  head.appendChild(el("span", "badge " + (ok ? "ok" : "bad"), ok ? "verified" : "withheld"));
  card.appendChild(head);

  if (!ok) {
    card.appendChild(el("p", "bad", "I computed a candidate answer but could not verify it, so I'm not returning it:"));
  }

  const verified = el("div", "mono");
  for (const check of answer.verified.checks) {
    const line = el("div", check.ok ? "ok" : "bad", (check.ok ? "✓ " : "✗ ") + check.name + (check.detail ? " — " + check.detail : ""));
    verified.appendChild(line);
  }

  const facts = el("div", "mono");
  if (answer.facts.length) {
    for (const fact of answer.facts) {
      facts.appendChild(el("div", null,
        `${fact.name} = ${fmt(fact.value)} ${fact.unit} · ${fact.source.library} ${fact.source.key} v${fact.source.version}   [resolved, not assumed]`));
    }
  } else {
    facts.appendChild(el("span", "dim", "(no resolved facts)"));
  }

  card.appendChild(bandsTable([
    ["Interpretation", answer.interpretation],
    ["Method", el("span", "mono", answer.method)],
  ]));
  // the execution trace (E2.15), as a first-class worked example
  const steps = answer.steps || [];
  if (steps.length > 1 || steps.some((s) => s.note)) {
    card.appendChild(stepsBlock(steps));
  }
  card.appendChild(bandsTable([
    ["Facts", facts],
    ["Verified", verified],
  ]));

  // the glass box: the IR and the artifact, one click deep — data, not a form
  card.appendChild(drilldown("IR — what was understood, as data", artifact.ir));
  card.appendChild(drilldown("Artifact — rerun this exact computation", artifact));

  const producer = artifact.ir.produced_by;
  if (producer) {
    const caveat = producer.provider === "assay" ? "" : "   (re-asking may read differently; the artifact reruns this exact IR)";
    card.appendChild(el("p", "dim mono", `NL→IR: ${producer.provider} ${producer.model}${caveat}`));
  }

  const save = el("button", "ghost", "Download artifact (.result.json)");
  save.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(artifact, null, 2)], { type: "application/json" });
    const link = el("a");
    link.href = URL.createObjectURL(blob);
    link.download = "assay.result.json";
    link.click();
    URL.revokeObjectURL(link.href);
  });
  card.appendChild(save);
  render(card);
}

function renderMissing(body) {
  const card = el("div", "card state");
  const count = body.needed.length === 1 ? "one input" : `${body.needed.length} inputs`;
  card.appendChild(el("div", null, `I need ${count} to answer this — nothing will be fabricated:`));
  const fields = [];
  for (const need of body.needed) {
    const row = el("div", "missing-row");
    row.appendChild(el("label", null, need.name));
    const input = el("input");
    input.type = "text";
    input.placeholder = "value unit, e.g. 8.33e-6 m^4";
    fields.push([need.name, input]);
    row.appendChild(input);
    row.appendChild(el("span", "dim", "dimension " + need.dimension));
    card.appendChild(row);
    if (need.reason) card.appendChild(el("div", "dim mono", "  " + need.reason));
  }
  const resolved = Object.entries(body.ir.resolved || {});
  if (resolved.length) {
    const lines = resolved.map(([name, fact]) =>
      `${name} = ${fmt(fact.value)} ${fact.unit} (${fact.source.library} ${fact.source.key} v${fact.source.version})`);
    card.appendChild(el("p", "dim mono", "Resolved   " + lines.join(",  ")));
  }
  const compute = el("button", null, "Compute");
  compute.addEventListener("click", async () => {
    const ir = structuredClone(body.ir);
    for (const [name, input] of fields) {
      const match = input.value.trim().match(/^([-+]?[\d.]+(?:[eE][-+]?\d+)?)\s*(.*)$/);
      if (!match) { input.focus(); return; }
      ir.inputs[name] = { value: parseFloat(match[1]), unit: match[2].replace(/\^/g, "**") };
      ir.missing_inputs = ir.missing_inputs.filter((m) => m !== name);
    }
    dispatch(await post("/v1/run", { ir }));
  });
  card.appendChild(compute);
  card.appendChild(drilldown("IR so far — what was understood", body.ir));
  render(card);
}

function renderAmbiguous(body) {
  const card = el("div", "card state");
  card.appendChild(el("div", null, `This is ambiguous — I can read it ${body.options.length} ways:`));
  for (const option of body.options) {
    const pick = el("button", "ghost option", `${option.pick}) ${option.reading}   (${option.task})`);
    pick.addEventListener("click", async () => {
      dispatch(await post("/v1/ask", { question: lastQuestion, pick: option.pick }));
    });
    card.appendChild(pick);
  }
  render(card);
}

function renderOutOfScope(body) {
  const card = el("div", "card state refuse");
  card.appendChild(el("div", null, "I can't answer this — it's outside what I cover."));
  card.appendChild(el("p", "dim mono", body.reason));
  card.appendChild(el("p", "dim", "Covered domains: " + body.covered.join(", ")));
  card.appendChild(el("div", null, "I won't guess."));
  render(card);
}

function dispatch({ status, data }) {
  if (status !== 200) {
    const card = el("div", "card state refuse");
    card.appendChild(el("div", "err", "error: " + (data.error || data.detail || `HTTP ${status}`)));
    render(card);
    return;
  }
  if (data.outcome === "answer") renderAnswer(data);
  else if (data.outcome === "missing_inputs") renderMissing(data);
  else if (data.outcome === "ambiguous") renderAmbiguous(data);
  else if (data.outcome === "out_of_scope") renderOutOfScope(data);
}

$("askform").addEventListener("submit", async (event) => {
  event.preventDefault();
  const question = $("question").value.trim();
  if (!question) return;
  lastQuestion = question;
  render(el("div", "card dim", "computing…"));
  dispatch(await post("/v1/ask", { question }));
});

for (const example of EXAMPLES) {
  const chip = el("button", null, example);
  chip.type = "button";
  chip.addEventListener("click", () => {
    $("question").value = example;
    $("askform").requestSubmit();
  });
  $("chips").appendChild(chip);
}

(async () => {
  try {
    const response = await fetch("/v1/domains");
    const entries = await response.json();
    // subject -> topic -> count + domains (the taxonomy, rendered compactly)
    const tree = new Map();
    for (const entry of entries) {
      const subject = entry.subject || "other";
      const topic = entry.topic || entry.domain;
      if (!tree.has(subject)) tree.set(subject, new Map());
      const topics = tree.get(subject);
      if (!topics.has(topic)) topics.set(topic, { count: 0, domains: new Set() });
      const node = topics.get(topic);
      node.count += 1;
      node.domains.add(entry.domain);
    }
    const box = $("domains");
    box.replaceChildren();
    for (const [subject, topics] of [...tree.entries()].sort()) {
      const row = el("div", "domain");
      row.appendChild(el("b", null, subject));
      const parts = [...topics.entries()]
        .sort()
        .map(([topic, node]) => `${topic} (${node.count})`);
      row.appendChild(document.createTextNode("  " + parts.join(" · ")));
      box.appendChild(row);
    }
  } catch {
    $("domains").textContent = "unavailable";
  }
})();
</script>
</body>
</html>
